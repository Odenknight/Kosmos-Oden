name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # The release ships only if the full validation pipeline passes.
      - run: npm ci
      - run: npm run verify

      - name: Verify tag matches manifest version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VER=$(node -p "require('./manifest.json').version")
          if [ "$TAG" != "$VER" ]; then
            echo "tag v$TAG does not match manifest version $VER" >&2
            exit 1
          fi

      - name: Assemble clean release (BUILD-INFO.json + SHA256SUMS)
        run: npm run package:release

      - name: Verify checksums
        run: cd release && sha256sum -c SHA256SUMS

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: release/*
          generate_release_notes: true
