version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Group dev-tool bumps so CI reviews them together; never auto-merge build tools.
      build-tools:
        patterns:
          - "esbuild"
          - "typescript"
          - "@types/*"
    commit-message:
      prefix: "deps"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
